name: medical_app
description: "Seevak Care - Healthcare Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  # Required for flutter_lints ^5.0.0
  sdk: ^3.5.0

  # Compatible with Flutter 3.41.6
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Secure storage (web-compatible)
  flutter_secure_storage: ^9.2.2

  # Date / time utilities
  intl: ^0.19.0

  # UI components
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

  # Payment integration (web-safe wrapper)
  razorpay_flutter: ^1.3.7

  # File picker (latest web-compatible)
  file_picker: ^8.0.0+1

  # Image picker
  image_picker: ^1.1.2

  # URL launcher (tel:, mailto:)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Modern lint rules (requires Dart >= 3.5.0)
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
