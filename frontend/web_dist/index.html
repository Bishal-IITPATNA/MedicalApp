  <script>
    // Workaround for Dart `intl` crash on browsers that report an empty or
    // non-canonical navigator.language. We force a canonical locale early so
    // the engine boots cleanly.
    (function () {
      try {
        var lang = (navigator.language || '').trim();
        var langs = (navigator.languages || []).slice();
        var ok = /^[a-zA-Z]{2,3}(-[A-Za-z0-9]+)*$/.test(lang);
        if (!ok) {
          Object.defineProperty(navigator, 'language', { get: function () { return 'en-US'; } });
          Object.defineProperty(navigator, 'languages', { get: function () { return ['en-US', 'en']; } });
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
