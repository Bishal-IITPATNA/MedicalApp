# Fixed Azure App Service Deployment for Seevak Care Backend
name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_78440EA0F40F4DD097867124C2D67F21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2DD5AD037E6E439AAD7D3BF85369D565 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_55D71896B10244CCA1DA74C96776A35C }}

      - name: Create deployment package
        run: |
          echo "📦 Creating deployment package..."
          cd backend
          
          # Verify required files exist
          if [ ! -f "main.py" ]; then
            echo "❌ Error: main.py not found!"
            exit 1
          fi
          
          if [ ! -f "requirements.txt" ]; then
            echo "❌ Error: requirements.txt not found!"
            exit 1
          fi
          
          # Create ZIP with proper structure (backend contents at root level)
          zip -r ../backend-deploy.zip . -x "*.git*" "**/__pycache__/**" "*.pyc" "**/.*" "**/.DS_Store" "**/*.log"
          
          cd ..
          echo "✅ Deployment package created"
          
          # Show ZIP contents for verification
          echo "📂 Package contents:"
          unzip -l backend-deploy.zip | head -15

      - name: Configure Azure App Service
        run: |
          echo "⚙️ Configuring Azure App Service..."
          
          # Stop app to prevent deployment conflicts
          az webapp stop --name webapp-seevak-backend --resource-group rg-seevak-care-prod || true
          
          # Set correct startup command
          az webapp config set \
            --name webapp-seevak-backend \
            --resource-group rg-seevak-care-prod \
            --startup-file "python main.py"
          
          # Set required app settings for Flask
          az webapp config appsettings set \
            --name webapp-seevak-backend \
            --resource-group rg-seevak-care-prod \
            --settings \
              PYTHONPATH=/home/site/wwwroot \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              FLASK_ENV=production
          
          echo "✅ App Service configured"

      - name: Deploy to Azure App Service
        run: |
          echo "🚀 Deploying to Azure App Service..."
          
          # Deploy ZIP package
          az webapp deployment source config-zip \
            --resource-group rg-seevak-care-prod \
            --name webapp-seevak-backend \
            --src backend-deploy.zip
          
          echo "✅ Deployment completed"

      - name: Start and verify deployment
        run: |
          echo "▶️ Starting app service..."
          az webapp start --name webapp-seevak-backend --resource-group rg-seevak-care-prod
          
          echo "⏳ Waiting for app to start..."
          sleep 30
          
          echo "🔍 Testing health endpoint..."
          curl -f "https://webapp-seevak-backend.azurewebsites.net/health" || echo "Health check pending - app may still be initializing"
          
          echo "✅ Deployment process completed!"
          echo "🌍 App URL: https://webapp-seevak-backend.azurewebsites.net"
          
