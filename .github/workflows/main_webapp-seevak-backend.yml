# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - webapp-seevak-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_78440EA0F40F4DD097867124C2D67F21 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2DD5AD037E6E439AAD7D3BF85369D565 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_55D71896B10244CCA1DA74C96776A35C }}

      - name: Create deployment package
        run: |
          cd backend
          echo "📦 Creating deployment package..."
          # Clean up any cache files
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          
          # Create clean ZIP package
          zip -r ../backend-deploy.zip . \
            -x "*.git*" \
            -x "**/__pycache__/**" \
            -x "*.pyc" \
            -x "*.log" \
            -x "antenv/**" \
            -x "venv/**"
          
          cd ..
          echo "✅ Package created: $(ls -lh backend-deploy.zip)"

      - name: Configure Azure App Service
        run: |
          echo "⚙️ Configuring Azure App Service..."
          
          # Stop app to prevent conflicts
          az webapp stop --name webapp-seevak-backend --resource-group rg-seevak-care-prod || echo "Stop failed"
          sleep 10
          
          # Configure app settings
          az webapp config appsettings set \
            --name webapp-seevak-backend \
            --resource-group rg-seevak-care-prod \
            --settings \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true || echo "Settings failed"
          
          # Set startup command
          az webapp config set \
            --name webapp-seevak-backend \
            --resource-group rg-seevak-care-prod \
            --startup-file "python main.py" || echo "Startup command failed"

      - name: Deploy to Azure App Service (Reliable Method)
        run: |
          echo "🚀 Deploying to Azure App Service..."
          
          # Use the same method as successful azure-deploy.yml
          az webapp deployment source config-zip \
            --resource-group rg-seevak-care-prod \
            --name webapp-seevak-backend \
            --src backend-deploy.zip \
            --timeout 600

      - name: Start and verify deployment
        run: |
          echo "🔄 Starting and verifying deployment..."
          
          # Start the app
          az webapp start --name webapp-seevak-backend --resource-group rg-seevak-care-prod
          sleep 15
          
          # Check app status
          APP_STATE=$(az webapp show \
            --name webapp-seevak-backend \
            --resource-group rg-seevak-care-prod \
            --query "state" \
            --output tsv)
          
          echo "App state: $APP_STATE"
          
          if [ "$APP_STATE" = "Running" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 App URL: https://webapp-seevak-backend.azurewebsites.net"
          else
            echo "⚠️ App may still be starting up..."
          fi
          
          # Test health endpoint
          echo "🏥 Testing health endpoint..."
          sleep 10
          curl -f https://webapp-seevak-backend.azurewebsites.net/health || echo "Health check pending..."
          
